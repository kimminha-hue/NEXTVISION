<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - All-In-Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/page.css">
    <link rel="stylesheet" href="../css/chatbot.css">
    <link rel="stylesheet" href="../css/pages/login.css">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <h1 class="logo"><a href="index.html">AUDI MALL</a></h1>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">쇼핑하기</a></li>
                    <li><a href="login.html" aria-current="page">로그인</a></li>
                    <li><a href="signup.html">회원가입</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container login-main">
        <div class="login-box">
            <h2 class="login-title">로그인</h2>
            <form class="login-form">
                <input type="text" id="login-username" placeholder="아이디" class="input-field">
                <input type="password" id="login-password" placeholder="비밀번호" class="input-field">
                <button type="button" class="btn btn-primary" onclick="handleLogin()">로그인</button>
            </form>
            <div class="social-login">
    <p class="divider">또는</p>

    <!-- 구글 로그인 -->
<button class="google-btn" aria-label="Google 계정으로 로그인" onclick="googleLogin()">
    <img src="../images/google.png" alt="구글로 로그인" >
    구글로 로그인
</button>

    <!-- 카카오 로그인 -->
    <button class="kakao-btn" onclick="kakaoLogin()">
        <img src="../images/kakao.png" alt="카카오 로그인">
        카카오로 로그인
    </button>
</div>
            <p class="signup-link">
                계정이 없으신가요? <a href="signup.html">회원가입</a>
            </p>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2026 All-In-Shop. All rights reserved.</p>
        </div>
    </footer>

    <!-- JS 파일 연결 -->
    <script src="../js/login.js"></script>
</body>
</html>
