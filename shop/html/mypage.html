<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>마이페이지</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/page.css">
    <link rel="stylesheet" href="../css/chatbot.css">
    <link rel="stylesheet" href="../css/pages/mypage.css">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <h1 class="logo" aria-label="AUDI MALL homepage">
                <a href="index.html" style="display:flex; align-items:center; gap:10px; text-decoration:none;">
                    <img src="../images/audiview.png" alt="AudiMall 로고" class="logo-img">
                    <span class="logo-text">
                        <span class="logo-audi">AUDI</span><span class="logo-view">MALL</span>
                    </span>
                </a>
            </h1>
            <nav aria-label="메인 내비게이션">
                <ul class="nav-links">
                    <li id="nav-intro"><a href="../../audiview/index.html">소개페이지</a></li>
                    <li><a href="index.html" aria-current="page">쇼핑하기</a></li>
                    <li><a href="login.html">로그인</a></li>
                    <li><a href="signup.html">회원가입</a></li>
                </ul>
            </nav>
        </div>
    </header>
<div class="mypage-container">
    <aside class="mypage-sidebar">
        <ul>
            <li class="menu-item active" data-tab="profile">회원정보</li>
            <li class="menu-item" data-tab="orders">주문내역</li>
            <li class="menu-item" data-tab="reviews">리뷰관리</li>
        </ul>
    </aside>

    <div class="mypage-content">
        <!-- 회원정보 -->
        <div id="profile" class="tab-panel active">
            <h2>회원정보</h2>
            <form id="profile-form">
                <label>이름 <input type="text" id="name" value=""></label>
                <label>이메일 <input type="email" id="email" value=""></label>
                <label>연락처 <input type="tel" id="phone" value=""></label>
                <label>주소 <input type="text" id="address" value=""></label>
                <button type="submit" class="btn btn-primary">저장</button>
            </form>
            <div class="profile-actions">
                <button class="btn btn-outline" id="change-password">비밀번호 변경</button>
                <button class="btn btn-outline" id="delete-account">회원 탈퇴</button>
                <button class="btn btn-outline" id="linked-accounts">연동 계정 관리</button>
            </div>
            <div id="password-modal" class="modal" style="display:none;">
                <div class="modal-content">
                    <span class="close">&times;</span>
                    <h3>비밀번호 변경</h3>
                    <input type="password" id="current-password" placeholder="현재 비밀번호">
                    <input type="password" id="new-password" placeholder="새 비밀번호">
                    <input type="password" id="confirm-password" placeholder="새 비밀번호 확인">
                    <button class="btn btn-primary" id="save-password">변경 완료</button>
                </div>
            </div>
        </div>

        <!-- 주문내역 -->
        <div id="orders" class="tab-panel">
            <h2>주문내역</h2>
            <div class="order-filters">
                <button data-status="all" class="filter-btn active">전체</button>
                <button data-status="shipping" class="filter-btn">배송중</button>
                <button data-status="delivered" class="filter-btn">배송완료</button>
                <button data-status="cancelled" class="filter-btn">취소/반품</button>
            </div>
            <div class="orders-list"></div>
        </div>

        <!-- 리뷰관리 -->
        <div id="reviews" class="tab-panel">
            <h2>리뷰관리</h2>
            <div class="reviews-list"></div>
        </div>

    </div>
</div>

<!-- 🔥 리뷰 수정 모달 -->
<div id="edit-modal" class="modal hidden">
  <div class="modal-content">
    <h3>리뷰 수정</h3>

    <p id="edit-product-name"></p>

    <div id="edit-stars" class="star-rating">
      <span data-value="1">★</span>
      <span data-value="2">★</span>
      <span data-value="3">★</span>
      <span data-value="4">★</span>
      <span data-value="5">★</span>
    </div>

    <textarea id="edit-content" placeholder="리뷰를 수정하세요"></textarea>

    <div class="modal-actions">
      <button id="save-edit" class="btn">저장</button>
      <button id="cancel-edit" class="btn btn-outline">취소</button>
    </div>
  </div>
</div>
<script src="../js/script.js"></script>
<script src="../js/mypage.js"></script>
</body>
</html>
