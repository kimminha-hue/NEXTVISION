<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>관리자 - 상품 관리</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background: #0A0A0A; color: #fff; padding: 30px; }
        h2 { color: #FFD600; text-align: center; margin-bottom: 30px; }

        /* 상품 목록 테이블 */
        .product-table { width: 100%; border-collapse: collapse; background: #111; border-radius: 12px; overflow: hidden; }
        .product-table th { background: #FFD600; color: #000; padding: 12px; text-align: left; }
        .product-table td { padding: 12px; border-bottom: 1px solid #2b2e3c; vertical-align: middle; }
        .product-table tr:hover { background: #1a1a2e; }
        .product-table img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; }

        /* 버튼 */
        .btn-edit { background: #FFD600; color: #000; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-delete { background: #ff4d4f; color: #fff; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-edit:hover { background: #e6c200; }
        .btn-delete:hover { background: #ff7875; }

        /* 수정 모달 */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 999; }
        .modal.show { display: flex; }
        .modal-box { background: #111; border: 1px solid #FFD600; border-radius: 16px; padding: 2rem; width: 90%; max-width: 550px; display: flex; flex-direction: column; gap: 1rem; max-height: 85vh; overflow-y: auto; }
        .modal-box h3 { color: #FFD600; text-align: center; margin: 0; }
        .modal-box label { color: #FFD600; font-size: 0.9rem; font-weight: bold; }
        .modal-box input { width: 100%; padding: 10px; background: #222; border: 1px solid #2b2e3c; border-radius: 8px; color: #fff; box-sizing: border-box; }
        .modal-box textarea { width: 100%; padding: 10px; background: #222; border: 1px solid #2b2e3c; border-radius: 8px; color: #fff; box-sizing: border-box; min-height: 200px; resize: vertical;}
        .modal-box input:focus, .modal-box textarea:focus { outline: none; border-color: #FFD600; }
        .modal-actions { display: flex; gap: 10px; }
        .modal-box::-webkit-scrollbar {width: 6px;}
        .modal-box::-webkit-scrollbar-track {background: #222; border-radius: 10px;}
        .modal-box::-webkit-scrollbar-thumb {background: #FFD600; border-radius: 10px;}
        .modal-box::-webkit-scrollbar-thumb:hover {background: #e6c200;}
        .btn-save { flex: 2; padding: 10px; background: #FFD600; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-cancel { flex: 1; padding: 10px; background: transparent; color: #fff; border: 1px solid #555; border-radius: 8px; cursor: pointer; }
        .btn-save:hover { background: #e6c200; }
        .btn-cancel:hover { border-color: #FFD600; color: #FFD600; }

        /* 현재 이미지 미리보기 */
        .current-images { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
        .current-images img { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; border: 1px solid #2b2e3c; }
    </style>
</head>
<body>

<div style="display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: #111; border-bottom: 1px solid #2b2e3c; margin: -30px -30px 30px -30px;">
    <span style="color:#FFD600; font-weight:bold; font-size:1.1rem;">📦 상품 관리</span>
    <div style="display:flex; gap:10px;">
        <a href="admin_test.html" style="background:transparent; color:#FFD600; border:1px solid #FFD600; padding:7px 16px; border-radius:8px; text-decoration:none; font-size:0.9rem;">🛠 상품등록</a>
        <a href="index.html" style="background:#FFD600; color:#000; padding:7px 16px; border-radius:8px; text-decoration:none; font-weight:bold; font-size:0.9rem;">🏠 홈으로</a>
    </div>
</div>

<h2>📦 상품 관리</h2>
<table class="product-table">
    <thead>
        <tr>
            <th>이미지</th>
            <th>상품명</th>
            <th>카테고리</th>
            <th>가격</th>
            <th>관리</th>
        </tr>
    </thead>
    <tbody id="product-tbody"></tbody>
</table>

<!-- 수정 모달 -->
<div class="modal" id="edit-modal">
    <div class="modal-box">
        <h3>상품 수정</h3>
        <input type="hidden" id="edit-id">

        <label>상품명</label>
        <input type="text" id="edit-name">

        <label>카테고리</label>
        <input type="text" id="edit-category">

        <label>가격</label>
        <input type="number" id="edit-price">

        <label>상세설명</label>
        <textarea id="edit-desc" rows="4"></textarea>

        <label>현재 이미지</label>
        <div class="current-images" id="current-images"></div>

        <label>이미지 1 교체 (선택)</label>
        <input type="file" id="edit-img1" accept="image/*">

        <label>이미지 2 교체 (선택)</label>
        <input type="file" id="edit-img2" accept="image/*">

        <label>이미지 3 교체 (선택)</label>
        <input type="file" id="edit-img3" accept="image/*">

        <label>이미지 4 교체 (선택)</label>
        <input type="file" id="edit-img4" accept="image/*">

        <div class="modal-actions">
            <button class="btn-save" onclick="saveEdit()">저장</button>
            <button class="btn-cancel" onclick="closeModal()">취소</button>
        </div>
    </div>
</div>

<script>
const API = '/api/product';

// 상품 목록 불러오기
async function loadProducts() {
    const res = await fetch(`${API}/list`);
    const products = await res.json();
    const tbody = document.getElementById('product-tbody');

    tbody.innerHTML = products.map(p => `
        <tr>
            <td><img src="${p.img1}" alt="${p.name}"></td>
            <td>${p.name}</td>
            <td>${p.category}</td>
            <td>₩${p.price.toLocaleString()}</td>
            <td>
                <button class="btn-edit" onclick="openEdit(${p.id})">수정</button>
                <button class="btn-delete" onclick="deleteProduct(${p.id}, '${p.name}')">삭제</button>
            </td>
        </tr>
    `).join('');
}

// 수정 모달 열기
async function openEdit(id) {
    const res = await fetch(`${API}/list`);
    const products = await res.json();
    const p = products.find(item => item.id === id);
    if (!p) return;

    document.getElementById('edit-id').value = p.id;
    document.getElementById('edit-name').value = p.name;
    document.getElementById('edit-category').value = p.category;
    document.getElementById('edit-price').value = p.price;
    document.getElementById('edit-desc').value = p.description;

    // 현재 이미지 미리보기
    const imgContainer = document.getElementById('current-images');
    imgContainer.innerHTML = [p.img1, p.img2, p.img3, p.img4]
        .filter(Boolean)
        .map(url => `<img src="${url}" alt="현재 이미지">`)
        .join('');

    document.getElementById('edit-modal').classList.add('show');
}

// 수정 저장
async function saveEdit() {
    const id = document.getElementById('edit-id').value;
    const formData = new FormData();

    formData.append('p_name', document.getElementById('edit-name').value);
    formData.append('p_category', document.getElementById('edit-category').value);
    formData.append('p_price', document.getElementById('edit-price').value);
    formData.append('p_desc', document.getElementById('edit-desc').value);

    // 새 이미지가 선택됐을 때만 추가
    ['img1','img2','img3','img4'].forEach(key => {
        const file = document.getElementById(`edit-${key}`).files[0];
        if (file) formData.append(key, file);
    });

    try {
        const res = await fetch(`${API}/update/${id}`, {
            method: 'PUT',
            body: formData
        });
        const result = await res.json();

        if (result.status === 'success') {
            alert('수정 완료! ✅');
            closeModal();
            loadProducts(); // 목록 새로고침
        } else {
            alert('수정 실패: ' + result.message);
        }
    } catch (err) {
        alert('서버 오류: ' + err.message);
    }
}

// 상품 삭제
async function deleteProduct(id, name) {
    if (!confirm(`"${name}" 상품을 삭제하시겠습니까?`)) return;

    try {
        const res = await fetch(`${API}/delete/${id}`, {
            method: 'DELETE'
        });
        const result = await res.json();

        if (result.status === 'success') {
            alert('삭제 완료! 🗑️');
            loadProducts(); // 목록 새로고침
        } else {
            alert('삭제 실패: ' + result.message);
        }
    } catch (err) {
        alert('서버 오류: ' + err.message);
    }
}

// 모달 닫기
function closeModal() {
    document.getElementById('edit-modal').classList.remove('show');
    // 파일 입력창 초기화
    ['img1','img2','img3','img4'].forEach(key => {
        document.getElementById(`edit-${key}`).value = '';
    });
}

loadProducts();
</script>
