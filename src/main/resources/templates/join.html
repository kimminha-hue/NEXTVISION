<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>회원가입</title>

<style>
.error {
	color: red;
	margin-bottom: 10px;
}
</style>

</head>
<body>

	<h1>회원가입</h1>

	<div th:if="${param.idError != null and param.idError[0] == 'empty'}"
		class="error">아이디를 입력해주세요.</div>

	<div
		th:if="${param.nameError != null and param.nameError[0] == 'empty'}"
		class="error">이름을 입력해주세요.</div>

	<div th:if="${param.pwError != null and param.pwError[0] == 'empty'}"
		class="error">비밀번호를 입력해주세요.</div>

	<div th:if="${param.pwError != null and param.pwError[0] == 'length'}"
		class="error">비밀번호는 8자 이상이어야 합니다.</div>

	<div th:if="${param.pwError != null and param.pwError[0] == 'format'}"
		class="error">비밀번호는 영문과 숫자를 포함해야 합니다.</div>

	<div
		th:if="${param.duplicate != null and param.duplicate[0] == 'true'}"
		class="error">이미 존재하는 아이디입니다.</div>

	<div th:if="${param.error != null and param.error[0] == 'invalid'}"
		class="error">잘못된 요청입니다.</div>

	<form th:action="@{/joinProcess}" method="post">
		아이디: <input type="text" name="loginId" required> <br>

		비밀번호: <input type="password" name="password" required> <br>

		이름: <input type="text" name="name" required> <br>

		<button type="submit">가입</button>
	</form>

</body>
</html>
